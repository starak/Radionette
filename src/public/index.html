<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radionette</title>
  <style>
    :root {
      --bg:         #1a1a1a;
      --bg-card:    #252525;
      --bg-hover:   #2e2e2e;
      --border:     #333;
      --text:       #ddd;
      --text-sec:   #999;
      --text-muted: #777;
      --text-dim:   #666;
      --dot-off:    #4a4a4a;
      --accent:     #7daf8b;
      --accent-bg:  #2a3a2e;
      --blue:       #6b8db5;
      --red:        #c0392b;
      --red-bg:     #3a2a2a;
      --amber:      #c9a84c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.3rem;
      letter-spacing: 0.1em;
      color: #fff;
    }

    h1 a { color: inherit; text-decoration: none; }

    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      padding: 0.5rem 1.2rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .status-card {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 1.5rem 2rem;
      width: 100%;
      max-width: 480px;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
    }

    .status-card h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 0.8rem;
    }

    .indicator {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--dot-off);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .dot.on { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .dot.off { background: var(--dot-off); }
    .dot.bluetooth { background: var(--blue); box-shadow: 0 0 8px var(--blue); }
    .dot.error { background: var(--red); box-shadow: 0 0 8px var(--red); }

    .mode-label {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .now-playing {
      text-align: center;
    }

    .channel-name {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }

    .metadata {
      font-size: 1rem;
      color: var(--text-sec);
      font-style: italic;
      min-height: 1.4em;
    }

    .off-message {
      font-size: 1.2rem;
      color: var(--text-dim);
      text-align: center;
      padding: 1rem 0;
    }

    .channel-list {
      list-style: none;
      font-size: 0.9rem;
    }

    .channel-list li {
      padding: 0.3rem 0;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .channel-list li:last-child { border-bottom: none; }

    .channel-list .ch-num {
      color: var(--text-dim);
      font-family: monospace;
      min-width: 2em;
    }

    .channel-list .ch-name { color: var(--text-sec); }

    .channel-list li.active {
      color: var(--accent);
    }

    .channel-list li.active .ch-name {
      color: var(--accent);
      font-weight: 600;
    }

    .channel-list .bank-header {
      color: var(--amber);
      font-family: monospace;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.6rem 0 0.2rem;
      border-bottom: 1px solid var(--border);
      display: block;
    }

    .channel-list .bank-header:first-child { padding-top: 0; }

    .connection-status {
      position: fixed;
      top: 0.5rem;
      right: 0.5rem;
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      background: var(--border);
    }

    .connection-status.connected { background: var(--accent-bg); color: var(--accent); }
    .connection-status.disconnected { background: var(--red-bg); color: var(--red); }
  </style>
</head>
<body>
  <h1><a href="/">RADIONETTE</a></h1>
  <nav class="tabs">
    <a href="/" class="tab active">Status</a>
    <a href="/wifi" class="tab">WiFi</a>
    <a href="/debug" class="tab">Debug</a>
  </nav>

  <div id="conn" class="connection-status disconnected">Disconnected</div>

  <div class="status-card">
    <h2>Status</h2>
    <div class="indicator">
      <div id="power-dot" class="dot off"></div>
      <span class="mode-label" id="power-label">Power Off</span>
    </div>
    <div class="indicator">
      <div id="bt-dot" class="dot off"></div>
      <span class="mode-label" id="bt-label">Bluetooth Off</span>
    </div>
    <div class="indicator">
      <div id="play-dot" class="dot off"></div>
      <span class="mode-label" id="play-label">Stopped</span>
    </div>
  </div>

  <div class="status-card now-playing" id="now-playing-card">
    <h2>Now Playing</h2>
    <div class="off-message" id="off-message">Power is off</div>
    <div id="playing-info" style="display:none;">
      <div class="channel-name" id="channel-name">-</div>
      <div class="metadata" id="metadata">-</div>
    </div>
  </div>

  <div class="status-card">
    <h2>Channels</h2>
    <ul class="channel-list" id="channel-list"></ul>
  </div>

  <script>
    const $ = id => document.getElementById(id);

    let ws;
    let reconnectTimer;

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/`);

      ws.onopen = () => {
        $('conn').textContent = 'Connected';
        $('conn').className = 'connection-status connected';
        if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      };

      ws.onclose = () => {
        $('conn').textContent = 'Disconnected';
        $('conn').className = 'connection-status disconnected';
        reconnectTimer = setTimeout(connect, 2000);
      };

      ws.onerror = () => {
        ws.close();
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.type === 'state') update(data);
        } catch (e) {
          console.error('WS parse error:', e);
        }
      };
    }

    function update(s) {
      // Power
      $('power-dot').className = 'dot ' + (s.power ? 'on' : 'off');
      $('power-label').textContent = s.power ? 'Power On' : 'Power Off';

      // Bluetooth
      $('bt-dot').className = 'dot ' + (s.bluetooth ? 'bluetooth' : 'off');
      if (s.bluetooth && s.bluetoothDevice) {
        $('bt-label').textContent = 'Bluetooth: ' + s.bluetoothDevice;
      } else if (s.bluetooth) {
        $('bt-label').textContent = 'Bluetooth Active';
      } else {
        $('bt-label').textContent = 'Bluetooth Off';
      }

      // Playing
      $('play-dot').className = 'dot ' + (s.playing ? 'on' : 'off');
      $('play-label').textContent = s.playing ? 'Playing' : 'Stopped';

      // Now playing section
      if (!s.power) {
        $('off-message').style.display = '';
        $('off-message').textContent = 'Power is off';
        $('playing-info').style.display = 'none';
      } else if (s.mode === 'bluetooth') {
        $('off-message').style.display = '';
        $('off-message').textContent = s.bluetoothDevice
          ? 'Connected: ' + s.bluetoothDevice
          : 'Waiting for connection...';
        $('playing-info').style.display = 'none';
      } else if (s.channel) {
        $('off-message').style.display = 'none';
        $('playing-info').style.display = '';
        $('channel-name').textContent = s.channel.name;
        $('metadata').textContent = s.metadata || 'Waiting for stream info...';
      } else {
        $('off-message').style.display = '';
        $('off-message').textContent = 'No channel selected';
        $('playing-info').style.display = 'none';
      }

      // Channel list — sorted and grouped by bank
      const bankMap = { 12: 1, 8: 2, 10: 3, 3: 4 };
      const subMap = { 0: 1, 1: 2, 8: 3, 10: 4, 12: 5 };

      if (s.channels) {
        const list = $('channel-list');
        list.innerHTML = '';
        const sorted = s.channels.slice().sort((a, b) => {
          const aBank = bankMap[(a.number >> 4) & 0xF] || 99;
          const bBank = bankMap[(b.number >> 4) & 0xF] || 99;
          if (aBank !== bBank) return aBank - bBank;
          const aSub = subMap[a.number & 0xF] || 99;
          const bSub = subMap[b.number & 0xF] || 99;
          return aSub - bSub;
        });
        let lastBank = null;
        sorted.forEach(ch => {
          const bLabel = bankMap[(ch.number >> 4) & 0xF] || '?';
          const sLabel = subMap[ch.number & 0xF] || '?';
          if (bLabel !== lastBank) {
            const hdr = document.createElement('li');
            hdr.className = 'bank-header';
            hdr.textContent = 'Bank ' + bLabel;
            list.appendChild(hdr);
            lastBank = bLabel;
          }
          const li = document.createElement('li');
          if (s.channel && s.channel.number === ch.number) {
            li.className = 'active';
          }
          li.innerHTML = `<span class="ch-num">${sLabel}</span><span class="ch-name">${ch.name}</span>`;
          list.appendChild(li);
        });
      }
    }

    connect();
  </script>
</body>
</html>
